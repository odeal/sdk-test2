name: nuget-build

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]

permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Pack NuGet
      run: dotnet pack -c Release --no-build -o artifacts

    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Install syft
      uses: anchore/sbom-action/download-syft@v0

    - name: Install grype
      uses: anchore/scan-action/download-grype@v3

# ---------------- SBOM ----------------

    - name: Generate SBOM
      run: |
        syft dir:. -o spdx-json > artifacts/sbom.json
        sha256sum artifacts/sbom.json | cut -d ' ' -f1 > artifacts/sbom.sha

# ---------------- VULN SCAN ----------------

    - name: Scan vulnerabilities
      run: |
        grype sbom:artifacts/sbom.json -o json > artifacts/vuln.json
        sha256sum artifacts/vuln.json | cut -d ' ' -f1 > artifacts/vuln.sha

# ---------------- SIGN ARTIFACT ----------------

    - name: Sign package
      run: |
        for pkg in artifacts/*.nupkg; do
          cosign sign-blob \
            --yes \
            --bundle artifacts/sign.bundle.json \
            "$pkg"
        done

# ---------------- VERIFY SIGNATURE ----------------

    - name: Verify package signature
      run: |
        for pkg in artifacts/*.nupkg; do
          cosign verify-blob \
            --bundle artifacts/sign.bundle.json \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/nuget.yml@refs/heads/main" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$pkg"
        done

# ---------------- SBOM ATTESTATION ----------------

    - name: Attest SBOM
      run: |
        # for pkg in artifacts/*.nupkg; do
        #   cosign attest-blob \
        #     --yes \
        #     --bundle artifacts/sbom.bundle.json \
        #     --predicate artifacts/sbom.json \
        #     --type spdx \
        #     "$pkg"
        # done
        COSIGN_EXPERIMENTAL=1 cosign attest-blob \
          --yes \
          --bundle artifacts/sbom.bundle.json \
          --predicate artifacts/sbom.json \
          --type spdx \
          "$pkg" </dev/null


# ---------------- VERIFY SBOM ----------------

    - name: Verify SBOM attestation
      run: |
        for pkg in artifacts/*.nupkg; do
          cosign verify-blob-attestation \
            --bundle artifacts/sbom.bundle.json \
            --type spdx \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/nuget.yml@refs/heads/main" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$pkg"
        done

# ---------------- SBOM REPRODUCIBILITY ----------------

    - name: Verify SBOM reproducibility
      run: |
        for pkg in artifacts/*.nupkg; do
          syft "$pkg" -o spdx-json > sbom.generated.json
          diff artifacts/sbom.json sbom.generated.json || true
        done

# ---------------- VULN ATTESTATION (SBOM → VULN LINK) ----------------

    - name: Attest vulnerabilities
      run: |
        for pkg in artifacts/*.nupkg; do
          cosign attest-blob \
            --yes \
            --bundle artifacts/vuln.bundle.json \
            --predicate artifacts/vuln.json \
            --type vuln \
            "$pkg"
        done

# ---------------- VERIFY VULN ----------------

    - name: Verify vulnerability attestation
      run: |
        for pkg in artifacts/*.nupkg; do
          cosign verify-blob-attestation \
            --bundle artifacts/vuln.bundle.json \
            --type vuln \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/nuget.yml@refs/heads/main" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$pkg"
        done

# ---------------- PROVENANCE ----------------

    - name: Generate provenance
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: artifacts/*.nupkg

# ---------------- ARTIFACTS ----------------

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget
        path: |
          artifacts/*.nupkg
          artifacts/sbom.json
          artifacts/vuln.json
          artifacts/*.bundle.json

# ---------------- PUBLISH ----------------

    - name: Add GitHub NuGet source
      run: |
        dotnet nuget add source \
          --username ${{ github.actor }} \
          --password ${{ secrets.GITHUB_TOKEN }} \
          --store-password-in-clear-text \
          --name github \
          https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

    - name: Publish NuGet package
      run: |
        dotnet nuget push artifacts/*.nupkg \
          --source github \
          --skip-duplicate
